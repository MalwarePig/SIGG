<!--ModalRecoleccion Produccion-->
<div class="modal fade bd-example-modal-lg" id="ModalRecoleccion" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div id="Nota" class="list-group">
            <div class="row">
                <div class="col-sm-12">
                    <div class="card">
                        <div class="card-body">
                            <div class="form-row">
        
                                <div class="form-group col-md-3">
                                    <input required type="text" id="OTBuscar" class="form-control" placeholder="OT" name="OTBuscar"
                                        autocomplete="off" value="69214">
                                </div>
        
                                <div class="form-group col-md-2">
                                    <button type="button" id="Carga" name="Carga" class="btn btn-secondary "
                                        onclick="CargaOTPendiente()">Buscar</button>
                                </div>
        
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        <!------------------------------ TABLA-------------------------------------->
        <div class="container-fluid shadow-lg p-3 mb-5 bg-white rounded">
            <table class=" table table-bordered table-hover" id="TablaRecoleccion">
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>OT</th>
                        <th>Maquina</th>
                        <th>Número de parte</th>
                        <th style="width: 15%">Cant. OT</th>
                        <th style="width: 15%">Mat. Inicial</th>
                        <th style="width: 15%">Mat. Extra</th>
                        <th>Iniciar</th>
                    </tr>
                </thead>
                <tbody id="CuerpoNota">
                </tbody>
                </table>
                <br><br>
                <hr />
    
                <button type="button" class="btn btn-secondary" data-dismiss="modal"  onclick="Recolectar()" data-target="#RecoleccionExito" data-toggle="modal">Registrar</button>
            </div>
          </div>
      </div>
    </div>
  </div>
