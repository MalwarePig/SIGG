<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>
        GEMAK
    </title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <%- include ('../partials/head.html') %>
<!-----------------------------------------------     incluir cabezera navegacion     ---------------------------------------------------------------->
    <script type="text/javascript" src="http://ajax.googleapis.com/ajax/libs/jquery/1.4/jquery.min.js"></script>
<!-----------------------------------------------     FECHAS MOMENTS     ---------------------------------------------------------------->
 <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.20.1/moment.min.js"></script>
    <script type="text/javascript" src="js/Almacen/Salidas.js"></script>
</head>

<body>
    <%- include ('../partials/navegacion.html') %>

    <div class="row">
        <div class="col-sm-4 p-1">
            <div class="card">
                <div class="card-body">
                    <div class="form-row">

                        <div class="form-group col-md-4">
                            <select required id="Planta" name="Planta" class="form-control">
                                <option  value="Nuevo" selected>Bravo</option>
                                <option  value="Nuevo">Morelos</option>
                            </select>
                        </div>

                        <div class="form-group col-md-5">
                            <select required id="Area" name="Area" class="form-control">
                                <option value="Produccion" selected>Produccion</option>
                                <option value="Acabados">Acabados</option>
                                <option value="Tratamientos">Trat. Externos</option>
                                <option value="Calidad">Calidad</option>
                                <option value="Embarques">Embarques</option>
                            </select>
                        </div>

                        <div class="form-group col-md-2 ">
                            <button type="button" id="Carga" name="Carga" class="btn btn-secondary "
                                onclick="Carga()">Buscar</button>
                        </div>
                        
                    </div>

                </div>
            </div>
        </div>

        <div class="col-sm-4 p-1">
            <div class="card">
                <div class="card-body">
                    <div class="form-row">
 
                        <div class="form-group col-md-1.5">
                            <label  class="font-weight-bold">Activas</label>
                        </div>

                        <div class="form-group col-md-2">
                            <input required type="text" id="Ubicacion" class="form-control" placeholder="A,5,B,2"
                                name="Sal_Ubicación" autocomplete="off" readonly>
                        </div>
 
                        <div class="form-group col-md-1.5 ">
                            <label  class="font-weight-bold">Vencidas</label>
                        </div>

                        <div class="form-group col-md-2">
                            <input required type="text" id="Ubicacion" class="form-control" placeholder="A,5,B,2"
                                name="Sal_Ubicación" autocomplete="off" readonly>
                        </div>

                        <div class="form-group col-md-1  text-dark  p-1">
                            <label for="inputAddress" class="font-weight-bold"> </label>
                        </div>
                        <div class="form-group col-md-1.5 bg-danger text-dark  p-1">
                            <label for="inputAddress" class="font-weight-bold">-3 Días</label>
                        </div>
                        <div class="form-group col-md-1.5 bg-warning text-dark  p-1">
                            <label for="inputAddress" class="font-weight-bold">4 Días</label>
                        </div>
                        <div class="form-group col-md-1.5 bg-success text-dark  p-1">
                            <label for="inputAddress" class="font-weight-bold">+5 Días</label>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <div class="col-sm-4 p-1">
            <div class="card">
                <div class="card-body">
                    <div class="form-row">

                        <div class="form-group col-md-3">
 
                            <input required type="text" id="Ubicacion" class="form-control" placeholder="A,5,B,2"
                                name="Sal_Ubicación" autocomplete="off" readonly required>
                        </div>

                        <div class="form-group col-md-3">
 
                            <input required type="text" id="Ubicacion" class="form-control" placeholder="A,5,B,2"
                                name="Sal_Ubicación" autocomplete="off" readonly required>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
 
    <div class="card text-center">
        <div class="card-body">
            <div class="container-fluid shadow-lg p-3 mb-5 bg-white rounded">
                <table class="table table-condensed table-hover" id="Almacen">
                    <thead> 
                        <tr>
                          <th>N°</th>
                          <th>OT</th>
                          <th>N° Parte</th>
                          <th>Estatus</th>
                          <th>Cantidad</th>
                          <th>Maquina</th>
                          <th>Fecha inicio</th>
                          <th>Fecha fin</th>
                          <th>Fecha vencimiento</th>
                        </tr>
                      </thead>
                  <tbody>
        
                  </tbody>
                </table>
              </div>
        </div>
    </div>

    


</body>
